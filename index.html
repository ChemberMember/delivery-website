<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#F8F2E4;font-family:'Hanken Grotesk',sans-serif;color:#463325;}
  ::selection{background:#FFC528;color:#463325;}
  @keyframes hk-rise{0%{opacity:0;transform:translateY(28px);}100%{opacity:1;transform:translateY(0);}}
  @keyframes hk-pop{0%{opacity:0;transform:scale(.4) rotate(-12deg);}60%{transform:scale(1.12) rotate(4deg);}100%{opacity:1;transform:scale(1) rotate(0);}}
  @keyframes hk-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  @keyframes hk-veil{0%{opacity:0;}100%{opacity:1;}}
  @keyframes hk-bob{0%,100%{transform:translateY(0);opacity:.55;}50%{transform:translateY(7px);opacity:1;}}
  @keyframes hk-load{0%{transform:translateX(-120%);}100%{transform:translateX(320%);}}}
  @media(max-width:1180px){.hdr-nav{display:none !important;}}
  a{text-decoration:none;}
  button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const h = React.createElement;

const COPY = {
  ru: {
    navMenu:'Меню',navDelivery:'Доставка',navContact:'Контакты',
    order:'Заказать доставку',add:'В корзину',hot:'Хит',replay:'Смотреть снова',
    scrollCue:'Листайте вниз',
    slogan:'Кебаб, от которого улыбаешься',
    sloganSub:'Свежие лепёшки, сочное мясо и соусы, которые мы готовим сами каждый день.',
    menuKicker:'Наше меню',menuTitle:'Популярные позиции',
    menuSub:'Готовим на огне, собираем при вас — классика и новинки каждый день.',
    menu:[
      {ph:'фото · kebab clasic',name:'Классический кебаб',desc:'Маринованное мясо, свежие овощи, фирменный чесночный соус в тёплой лепёшке.',price:'55 lei',hot:true},
      {ph:'фото · kebab pui',name:'Кебаб с курицей',desc:'Сочное куриное филе, хрустящие овощи и лёгкий йогуртовый соус.',price:'50 lei',hot:false},
      {ph:'фото · döner mix',name:'Дёнер микс',desc:'Говядина и курица вместе, двойная порция мяса для большого голода.',price:'65 lei',hot:true},
      {ph:'фото · falafel',name:'Фалафель',desc:'Хрустящие нутовые шарики, овощи и соус тахини — полностью вегетарианский.',price:'48 lei',hot:false},
      {ph:'фото · cartofi',name:'Картофель фри',desc:'Золотистый картофель с морской солью и фирменной приправой.',price:'25 lei',hot:false},
      {ph:'фото · limonadă',name:'Домашний лимонад',desc:'Освежающий лимонад с мятой, готовим каждое утро.',price:'30 lei',hot:false}
    ],
    deliveryKicker:'Доставка',deliveryTitle:'Привезём горячим за 30 минут',
    deliverySub:'Закажите онлайн или позвоните — соберём заказ, упакуем так, чтобы кебаб остался сочным, и доставим прямо к двери.',
    steps:[
      {n:'1',title:'Выберите блюда',body:'Откройте меню и добавьте любимые позиции в корзину.'},
      {n:'2',title:'Оформите заказ',body:'Укажите адрес и удобное время — оплата онлайн или при получении.'},
      {n:'3',title:'Встречайте курьера',body:'Готовим сразу после заказа и привозим в течение 30 минут.'}
    ],
    addressKicker:'Где нас найти',addressTitle:'Заходите в гости',
    addressLabel:'Адрес',addressValue:'бул. Штефан чел Маре 100, Кишинёв',
    hoursLabel:'Часы работы',hoursValue:'Ежедневно 10:00 — 23:00',hoursNote:'Пятница и суббота до 01:00',
    phoneLabel:'Телефон',mapPh:'карта · google maps',
    footerRights:'Все права защищены',
    cartLabel:'Корзина',accountLabel:'Аккаунт',pointsLabel:'Баллы',
    cartTitle:'Ваш заказ',cartEmpty:'Корзина пуста',cartEmptyHint:'Добавьте блюда из меню',
    cartTotalLabel:'Итого',checkout:'Оформить заказ',
    orderDone:'Заказ принят! Спасибо',orderDoneHint:'Баллы начислены на ваш счёт',
    accountName:'Гость',accountPhone:'+373 60 000 000',
    accountOrdersLabel:'Заказов',accountPointsLabel:'Баллов',accountSignIn:'Войти в профиль',
    pointsTitle:'Ваши баллы',pointsRule:'1 балл за каждые 10 lei в заказе',
    pointsToNextLabel:'до бесплатного кебаба',pointsReward:'500 баллов — кебаб в подарок',
    addressFieldLabel:'Адрес доставки',addressPlaceholder:'Улица, дом, квартира',
    addressCheck:'Проверить',addressInZone:'Отлично, вы в зоне доставки',
    modeDelivery:'Доставка',modePickup:'Самовывоз',
    pickupTitle:'Заберите сами за 15 минут',
    pickupSub:'Оформите заказ онлайн и заберите готовый кебаб на кассе — без очереди и ожидания.',
    pickupCta:'Оформить самовывоз',
    pickupSteps:[
      {n:'1',title:'Выберите блюда',body:'Добавьте любимые позиции в корзину.'},
      {n:'2',title:'Оформите онлайн',body:'Оплатите и выберите удобное время.'},
      {n:'3',title:'Заберите на кассе',body:'Назовите номер заказа — всё уже готово.'}
    ]
  },
  ro: {
    navMenu:'Meniu',navDelivery:'Livrare',navContact:'Contacte',
    order:'Comandă livrare',add:'În coș',hot:'Top',replay:'Vezi din nou',
    scrollCue:'Derulează în jos',
    slogan:'Kebab care te face să zâmbești',
    sloganSub:'Lipie proaspătă, carne suculentă și sosuri pe care le preparăm singuri în fiecare zi.',
    menuKicker:'Meniul nostru',menuTitle:'Cele mai populare',
    menuSub:'Pregătit pe foc, asamblat în fața ta. Alege clasicul sau încearcă ceva nou.',
    menu:[
      {ph:'foto · kebab clasic',name:'Kebab clasic',desc:'Carne marinată, legume proaspete și sos de usturoi în lipie caldă.',price:'55 lei',hot:true},
      {ph:'foto · kebab pui',name:'Kebab cu pui',desc:'File de pui suculent, legume crocante și sos ușor de iaurt.',price:'50 lei',hot:false},
      {ph:'foto · döner mix',name:'Döner mix',desc:'Vită și pui împreună, porție dublă de carne pentru poftă mare.',price:'65 lei',hot:true},
      {ph:'foto · falafel',name:'Falafel',desc:'Chiftele crocante de năut, legume și sos tahini — complet vegetarian.',price:'48 lei',hot:false},
      {ph:'foto · cartofi',name:'Cartofi prăjiți',desc:'Cartofi aurii cu sare de mare și condimentul nostru special.',price:'25 lei',hot:false},
      {ph:'foto · limonadă',name:'Limonadă de casă',desc:'Limonadă răcoritoare cu mentă, preparată în fiecare dimineață.',price:'30 lei',hot:false}
    ],
    deliveryKicker:'Livrare',deliveryTitle:'Livrăm fierbinte în 30 de minute',
    deliverySub:'Comandă online sau sună-ne — pregătim comanda, o ambalăm ca să rămână suculentă și o aducem la ușa ta.',
    steps:[
      {n:'1',title:'Alege felurile',body:'Deschide meniul și adaugă preferatele în coș.'},
      {n:'2',title:'Plasează comanda',body:'Indică adresa și ora dorită — plată online sau la livrare.'},
      {n:'3',title:'Întâmpină curierul',body:'Pregătim imediat după comandă și livrăm în 30 de minute.'}
    ],
    addressKicker:'Unde ne găsești',addressTitle:'Treci pe la noi',
    addressLabel:'Adresă',addressValue:'bd. Ștefan cel Mare 100, Chișinău',
    hoursLabel:'Program',hoursValue:'Zilnic 10:00 — 23:00',hoursNote:'Vineri și sâmbătă până la 01:00',
    phoneLabel:'Telefon',mapPh:'hartă · google maps',
    footerRights:'Toate drepturile rezervate',
    cartLabel:'Coș',accountLabel:'Cont',pointsLabel:'Puncte',
    cartTitle:'Comanda ta',cartEmpty:'Coșul e gol',cartEmptyHint:'Adaugă feluri din meniu',
    cartTotalLabel:'Total',checkout:'Plasează comanda',
    orderDone:'Comandă primită! Mulțumim',orderDoneHint:'Punctele au fost adăugate în cont',
    accountName:'Oaspete',accountPhone:'+373 60 000 000',
    accountOrdersLabel:'Comenzi',accountPointsLabel:'Puncte',accountSignIn:'Intră în cont',
    pointsTitle:'Punctele tale',pointsRule:'1 punct pentru fiecare 10 lei din comandă',
    pointsToNextLabel:'până la kebab gratuit',pointsReward:'500 de puncte — kebab cadou',
    addressFieldLabel:'Adresa de livrare',addressPlaceholder:'Strada, casa, apartament',
    addressCheck:'Verifică',addressInZone:'Perfect, ești în zona de livrare',
    modeDelivery:'Livrare',modePickup:'Ridicare',
    pickupTitle:'Ridică singur în 15 minute',
    pickupSub:'Plasează comanda online și ridică kebabul gata de la casă — fără coadă și fără așteptare.',
    pickupCta:'Comandă ridicare',
    pickupSteps:[
      {n:'1',title:'Alege felurile',body:'Adaugă preferatele în coș.'},
      {n:'2',title:'Plasează online',body:'Plătește și alege ora dorită.'},
      {n:'3',title:'Ridică de la casă',body:'Spune numărul comenzii — totul e gata.'}
    ]
  }
};

function App() {
  const videoRef = React.useRef(null);
  const [lang, setLang] = React.useState('ru');
  const [revealed, setRevealed] = React.useState(false);
  const [needsPlay, setNeedsPlay] = React.useState(false);
  const [playing, setPlaying] = React.useState(false);
  const [loaded, setLoaded] = React.useState(false);
  const [openPanel, setOpenPanel] = React.useState(null);
  const [cart, setCart] = React.useState({});
  const [points, setPoints] = React.useState(240);
  const [orders, setOrders] = React.useState(12);
  const [deliveryMode, setDeliveryMode] = React.useState('delivery');
  const [justOrdered, setJustOrdered] = React.useState(false);
  const [address, setAddress] = React.useState('');
  const [addressConfirmed, setAddressConfirmed] = React.useState(false);

  const t = COPY[lang];
  const isPickup = deliveryMode === 'pickup';

  React.useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    v.playbackRate = 1.25;
    const onLoaded = () => setLoaded(true);
    v.addEventListener('loadeddata', onLoaded);
    v.addEventListener('canplay', onLoaded);
    if (v.readyState >= 2) onLoaded();
    v.addEventListener('error', () => { setRevealed(true); setLoaded(true); });
    const p = v.play();
    if (p && p.catch) p.catch(() => setNeedsPlay(true));
    const timer = setTimeout(() => { onLoaded(); if (!v.duration) setRevealed(true); }, 4500);
    return () => { clearTimeout(timer); v.removeEventListener('loadeddata', onLoaded); v.removeEventListener('canplay', onLoaded); };
  }, []);

  const startPlay = () => { const v = videoRef.current; if (v) v.play(); setNeedsPlay(false); };
  const handlePlay = () => { setPlaying(true); setNeedsPlay(false); };
  const handleEnded = () => { setRevealed(true); setPlaying(false); };
  const replay = () => { const v = videoRef.current; if (v) { v.currentTime = 0; v.playbackRate = 1.25; v.play(); } setRevealed(false); };

  const togglePanel = (name) => setOpenPanel(p => p === name ? null : name);

  const addToCart = (id) => { setCart(c => ({...c, [id]: (c[id]||0)+1})); setJustOrdered(false); setOpenPanel('cart'); };
  const inc = (id) => setCart(c => ({...c, [id]: (c[id]||0)+1}));
  const dec = (id) => setCart(c => { const n = (c[id]||0)-1; const nc = {...c}; if(n<=0) delete nc[id]; else nc[id]=n; return nc; });

  const cartCount = Object.values(cart).reduce((a,b)=>a+b, 0);
  const cartHasItems = cartCount > 0;

  let cartTotalN = 0;
  const cartLines = Object.keys(cart).filter(k => cart[k]>0).map(k => {
    const i = parseInt(k.slice(1));
    const m = t.menu[i];
    const priceN = parseInt(m.price)||0;
    const qty = cart[k];
    cartTotalN += priceN * qty;
    return { id:k, name:m.name, priceLine:(priceN*qty)+' lei', qty, inc:()=>inc(k), dec:()=>dec(k) };
  });

  const doCheckout = () => {
    if (cartTotalN <= 0) return;
    setPoints(p => p + Math.round(cartTotalN/10));
    setOrders(o => o+1);
    setCart({});
    setJustOrdered(true);
  };

  const checkAddr = () => { if (address.trim().length > 3) setAddressConfirmed(true); };

  const pillBtn = (active) => ({
    border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:14,
    padding:'8px 14px',borderRadius:999,display:'flex',alignItems:'center',gap:7,
    transition:'all .15s',
    background: active ? '#463325' : 'transparent',
    color: active ? '#FFF8F5' : '#463325'
  });
  const langBtn = (active) => ({
    border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:13,
    padding:'7px 13px',borderRadius:999,transition:'all .15s',
    background: active ? '#FF6A21' : 'transparent',
    color: active ? '#fff' : '#7C6F57'
  });
  const modeBtn = (active) => ({
    border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:14,
    padding:'9px 22px',borderRadius:999,transition:'all .15s',
    background: active ? '#FFC528' : 'transparent',
    color: active ? '#463325' : '#C9BE9F'
  });

  const dTitle = isPickup ? t.pickupTitle : t.deliveryTitle;
  const dSub = isPickup ? t.pickupSub : t.deliverySub;
  const dCta = isPickup ? (t.pickupCta || t.order) : t.order;
  const dSteps = isPickup ? t.pickupSteps : t.steps;
  const pointsToNext = Math.max(0, 500 - points);
  const pointsPct = Math.min(100, Math.round(points/500*100)) + '%';

  return h('div', {style:{fontFamily:"'Hanken Grotesk',sans-serif",color:'#463325',background:'#F8F2E4',overflowX:'hidden'}},

    // LOADER
    h('div', {style:{position:'fixed',inset:0,zIndex:100,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#FFF8F5',transition:'opacity .6s ease',opacity:loaded?0:1,pointerEvents:loaded?'none':'auto',visibility:loaded?'hidden':'visible'}},
      h('img', {src:'assets/logo.svg',alt:'Smile Kebab',style:{width:88,height:'auto',animation:'hk-float 1.6s ease-in-out infinite'}}),
      h('div', {style:{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:22,letterSpacing:'-.02em',marginTop:18,color:'#463325'}}, 'Smile Kebab'),
      h('div', {style:{width:120,height:4,borderRadius:999,background:'#EFE0D4',overflow:'hidden',marginTop:18}},
        h('div', {style:{width:'40%',height:'100%',background:'#FF6A21',borderRadius:999,animation:'hk-load 1.1s ease-in-out infinite'}})
      )
    ),

    // HEADER
    h('header', {style:{position:'absolute',top:0,left:0,right:0,zIndex:40,display:'flex',alignItems:'center',justifyContent:'flex-start',gap:'clamp(24px,5vw,56px)',padding:'18px clamp(20px,5vw,56px)'}},
      h('div', {style:{display:'flex',alignItems:'center',gap:12}},
        h('img', {src:'assets/logo.svg',alt:'Smile Kebab',style:{width:38,height:'auto',display:'block'}}),
        h('span', {style:{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:20,letterSpacing:'-.02em'}}, 'Smile Kebab')
      ),
      h('nav', {className:'hdr-nav',style:{display:'flex',alignItems:'center',gap:'clamp(14px,2.4vw,30px)'}},
        h('a', {href:'#menu',style:{color:'#463325',textDecoration:'none',fontWeight:600,fontSize:15,opacity:.82}}, t.navMenu),
        h('a', {href:'#delivery',style:{color:'#463325',textDecoration:'none',fontWeight:600,fontSize:15,opacity:.82}}, t.navDelivery),
        h('a', {href:'#contact',style:{color:'#463325',textDecoration:'none',fontWeight:600,fontSize:15,opacity:.82}}, t.navContact)
      )
    ),

    // BACKDROP
    openPanel && h('div', {onClick:()=>setOpenPanel(null),style:{position:'fixed',inset:0,zIndex:55,background:'rgba(46,36,23,.16)'}}),

    // TOP-RIGHT CLUSTER
    h('div', {style:{position:'fixed',top:16,right:'clamp(20px,5vw,56px)',zIndex:60,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}},
      h('div', {style:{display:'flex',alignItems:'center',background:'rgba(255,255,255,.82)',backdropFilter:'blur(8px)',border:'1px solid #EAE0CB',borderRadius:999,padding:3,boxShadow:'0 6px 18px rgba(46,36,23,.08)'}},
        h('button', {onClick:()=>togglePanel('points'),style:pillBtn(openPanel==='points')},
          h('span', {style:{width:8,height:8,borderRadius:'50%',background:'#FF6A21',display:'inline-block'}}),
          t.pointsLabel, ' ', points
        ),
        h('button', {onClick:()=>togglePanel('account'),style:pillBtn(openPanel==='account')}, t.accountLabel),
        h('button', {onClick:()=>togglePanel('cart'),style:pillBtn(openPanel==='cart')},
          t.cartLabel,
          cartHasItems && h('span', {style:{minWidth:18,height:18,padding:'0 5px',borderRadius:999,background:'#FF6A21',color:'#fff',fontSize:11,fontWeight:800,display:'inline-flex',alignItems:'center',justifyContent:'center'}}, cartCount)
        )
      ),
      h('div', {style:{display:'flex',alignItems:'center',background:'rgba(255,255,255,.82)',backdropFilter:'blur(8px)',border:'1px solid #EAE0CB',borderRadius:999,padding:3,gap:2,boxShadow:'0 6px 18px rgba(46,36,23,.08)'}},
        h('button', {onClick:()=>setLang('ru'),style:langBtn(lang==='ru')}, 'RU'),
        h('button', {onClick:()=>setLang('ro'),style:langBtn(lang==='ro')}, 'RO')
      )
    ),

    // CART PANEL
    openPanel === 'cart' && h('div', {style:{position:'fixed',top:66,right:'clamp(20px,5vw,56px)',zIndex:62,width:'min(360px,90vw)',background:'#FFF8F5',border:'1px solid #EAE0CB',borderRadius:20,boxShadow:'0 22px 54px rgba(46,36,23,.24)',padding:22,animation:'hk-rise .3s ease both'}},
      h('div', {style:{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:20,color:'#463325',marginBottom:16}}, t.cartTitle),
      justOrdered && h('div', {style:{textAlign:'center',padding:'8px 0 4px'}},
        h('div', {style:{fontWeight:700,fontSize:17,color:'#1F8A5B',marginBottom:6}}, t.orderDone),
        h('div', {style:{fontSize:14,color:'#7C6F57'}}, t.orderDoneHint)
      ),
      cartHasItems && h(React.Fragment, null,
        h('div', {style:{display:'flex',flexDirection:'column',gap:14,maxHeight:300,overflow:'auto'}},
          cartLines.map(line =>
            h('div', {key:line.id,style:{display:'flex',alignItems:'center',gap:10}},
              h('div', {style:{flex:1,minWidth:0}},
                h('div', {style:{fontWeight:700,fontSize:15,color:'#463325'}}, line.name),
                h('div', {style:{fontSize:13,color:'#7C6F57'}}, line.priceLine)
              ),
              h('div', {style:{display:'flex',alignItems:'center',gap:9}},
                h('button', {onClick:line.dec,style:{width:28,height:28,borderRadius:'50%',border:'1px solid #E6DAC0',background:'#fff',color:'#463325',fontSize:17,fontWeight:700,cursor:'pointer',lineHeight:1,fontFamily:'inherit'}}, '−'),
                h('span', {style:{minWidth:18,textAlign:'center',fontWeight:700,color:'#463325'}}, line.qty),
                h('button', {onClick:line.inc,style:{width:28,height:28,borderRadius:'50%',border:'none',background:'#FFC528',color:'#463325',fontSize:17,fontWeight:700,cursor:'pointer',lineHeight:1,fontFamily:'inherit'}}, '+')
              )
            )
          )
        ),
        h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'18px 0 16px',paddingTop:14,borderTop:'1px solid #EFE6D2'}},
          h('span', {style:{fontWeight:600,color:'#7C6F57'}}, t.cartTotalLabel),
          h('span', {style:{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:22,color:'#463325'}}, cartTotalN + ' lei')
        ),
        h('button', {onClick:doCheckout,style:{width:'100%',background:'#FF6A21',color:'#fff',border:'none',fontWeight:700,fontSize:16,padding:14,borderRadius:999,cursor:'pointer',fontFamily:'inherit'}}, t.checkout)
      ),
      !cartHasItems && !justOrdered && h('div', {style:{textAlign:'center',padding:'6px 0 2px'}},
        h('div', {style:{fontWeight:700,fontSize:15,color:'#463325',marginBottom:4}}, t.cartEmpty),
        h('div', {style:{fontSize:14,color:'#7C6F57'}}, t.cartEmptyHint)
      )
    ),

    // ACCOUNT PANEL
    openPanel === 'account' && h('div', {style:{position:'fixed',top:66,right:'clamp(20px,5vw,56px)',zIndex:62,width:'min(340px,90vw)',background:'#FFF8F5',border:'1px solid #EAE0CB',borderRadius:20,boxShadow:'0 22px 54px rgba(46,36,23,.24)',padding:22,animation:'hk-rise .3s ease both'}},
      h('div', {style:{display:'flex',alignItems:'center',gap:14,marginBottom:18}},
        h('div', {style:{flex:'none',width:52,height:52,borderRadius:'50%',background:'#FFC528',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:23,color:'#463325'}}, (t.accountName||'?').charAt(0)),
        h('div', null,
          h('div', {style:{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:19,color:'#463325'}}, t.accountName),
          h('div', {style:{fontSize:14,color:'#7C6F57'}}, t.accountPhone)
        )
      ),
      h('div', {style:{display:'flex',gap:12,marginBottom:18}},
        h('div', {style:{flex:1,background:'#fff',border:'1px solid #EFE6D2',borderRadius:14,padding:13,textAlign:'center'}},
          h('div', {style:{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:23,color:'#463325'}}, orders),
